<div
  class="bg-dash-card-alt border border-dash-border rounded-2xl p-3 shadow-lg transition-shadow duration-300 hover:shadow-2xl max-w-sm">

  <!-- Image -->
  <figure class="mb-2">
    <img src="https://cdn.flyonui.com/fy-assets/components/card/image-9.png" alt="Watch"
      class="rounded-xl w-full object-cover" />
  </figure>

  <!-- Card content -->
  <div class="card-body">
    <h3 class="text-xl font-semibold mb-2 text-gray-900 hover:text-blue-600 transition-colors duration-200">
      Apple Smart Watch
    </h3>

    <app-progress-bar-component [progress]="90" class="mb-3"></app-progress-bar-component>

    <!-- Actions -->
    <div class="flex gap-3">
      <button
        class="flex-1 bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition-colors duration-200">
        Buy Now
      </button>
    </div>
  </div>
</div>
