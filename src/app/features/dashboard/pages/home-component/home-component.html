<div class="flex h-screen bg-dash-dark text-white font-sans overflow-hidden">

  <app-sidebar-component></app-sidebar-component>

  <main class="flex-1 flex flex-col overflow-y-auto">
    <header class="h-20 border-b border-dash-border flex items-center justify-between px-8">
      <div class="relative w-96">
        <input type="text" placeholder="Search"
          class="w-full bg-dash-card border border-dash-border rounded-full py-2 px-10 text-sm focus:outline-none">
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm font-medium">Instructor Midza K</span>
        <img src="https://cdn.flyonui.com/fy-assets/components/card/image-6.png"
          class="w-10 h-10 rounded-xl border-2 border-dash-accent">
      </div>
    </header>

    <div class="p-8 grid grid-cols-12 gap-6">
      <app-card-component class="col-span-4">
        <span header-title>STREAKS</span>
        <div class="text-4xl font-bold py-4">3 ⚡</div>
        <p class="text-sm text-dash-text-muted">Watch 3 lectures to lit up the streak</p>
      </app-card-component>

      <app-card-component class="col-span-8">
        <span header-title>PROGRESS</span>
        <div class="flex justify-around py-4">
          <app-progress-ring-component [percentage]="75" [label]="'Intro to Programming'"></app-progress-ring-component>
          <app-progress-ring-component [percentage]="75"
            [label]="'Nursing dynamics for the elderly'"></app-progress-ring-component>
          <app-progress-ring-component [percentage]="90" [label]="'Theory of Relativity'"></app-progress-ring-component>
          <app-progress-ring-component [percentage]="10" [label]="'Quantum Physics'"></app-progress-ring-component>
        </div>
      </app-card-component>

      <app-card-component class="col-span-4">
        <span header-title>SCHEDULE</span>
      </app-card-component>

      <app-card-component class="col-span-8">
        <span header-title>CONTINUE LEARNING</span>
        <div class="grid grid-cols-3 gap-4 mt-4">
          <app-image-card-component [mentor]="mentorName" [mentorRole]="mentorRole" [mentorImage]="mentorAvatar"
            [courseProgress]="courseProgress" [courseTitle]="courseTitle" [courseModule]="courseModule" [courseModuleImage]="courseModuleImage"></app-image-card-component>
        </div>
      </app-card-component>
    </div>
  </main>
</div>
