<header
  class="fixed top-0 inset-x-0 z-50 backdrop-blur-md bg-white/80 border-b border-surface-200/60"
>
  <nav
    class="mx-auto max-w-7xl flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16"
    aria-label="Main navigation"
  >
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2.5 group">
      <div
        class="flex items-center justify-center w-9 h-9 rounded-xl bg-brand-600 text-white font-bold text-base transition-transform group-hover:scale-105"
      >
        M
      </div>
      <span class="text-xl font-bold text-surface-900">MentorConnect</span>
    </a>

    <!-- Desktop nav -->
    <ul class="hidden md:flex items-center gap-1">
      @for (link of navLinks; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="text-brand-600 bg-brand-50"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            class="px-4 py-2 rounded-lg text-sm font-medium text-surface-600 hover:text-brand-600 hover:bg-brand-50/50 transition-colors"
          >
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- CTA -->
    <div class="hidden md:flex items-center gap-3">
      <a
        href="/auth/login"
        class="px-4 py-2 text-sm font-medium text-surface-700 hover:text-brand-600 transition-colors"
      >
        Sign in
      </a>
      <a
        href="/auth/register"
        class="px-5 py-2.5 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 rounded-xl transition-colors shadow-sm"
      >
        Get Started
      </a>
    </div>

    <!-- Mobile hamburger -->
    <button
      type="button"
      class="md:hidden p-2 rounded-lg text-surface-600 hover:bg-surface-100 transition-colors"
      (click)="mobileMenuOpen.set(!mobileMenuOpen())"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-controls="mobile-menu"
      aria-label="Toggle navigation menu"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        aria-hidden="true"
      >
        @if (mobileMenuOpen()) {
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        } @else {
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
          />
        }
      </svg>
    </button>
  </nav>

  <!-- Mobile menu -->
  @if (mobileMenuOpen()) {
    <div
      id="mobile-menu"
      class="md:hidden border-t border-surface-200/60 bg-white/95 backdrop-blur-md"
    >
      <ul class="px-4 py-3 space-y-1">
        @for (link of navLinks; track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="text-brand-600 bg-brand-50"
              [routerLinkActiveOptions]="{ exact: link.exact }"
              (click)="mobileMenuOpen.set(false)"
              class="block px-4 py-2.5 rounded-lg text-sm font-medium text-surface-600 hover:text-brand-600 hover:bg-brand-50 transition-colors"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>
      <div class="px-4 pb-4 flex flex-col gap-2">
        <a
          href="/auth/login"
          class="w-full text-center px-4 py-2.5 text-sm font-medium text-surface-700 border border-surface-300 rounded-xl hover:bg-surface-50 transition-colors"
        >
          Sign in
        </a>
        <a
          href="/auth/register"
          class="w-full text-center px-5 py-2.5 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 rounded-xl transition-colors"
        >
          Get Started
        </a>
      </div>
    </div>
  }
</header>
